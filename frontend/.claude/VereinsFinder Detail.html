<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Kassel Nordstadt — VereinsFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: #0f1c1d;
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#0D5C63",
  "accentColor": "#B35C00",
  "activeTab": "Überblick"
}/*EDITMODE-END*/;

// ─── Icons ────────────────────────────────────────────────────────────────────
const Icon = ({ name, size = 16, color = "currentColor" }) => {
  const icons = {
    mapPin: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
    arrow: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
    arrowLeft: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    starOutline: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    users: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
    calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    phone: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.13 6.13l.95-.95a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.98 16.5z"/></svg>,
    mail: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
    globe: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
    share: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    heart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
    heartFill: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
    ball: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    info: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    running: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="13" cy="4" r="2"/><path d="M7 21l3-6 2 2 3-8"/><path d="M17 21l-3-6"/><path d="M7 7l1 4 3 1"/></svg>,
    trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="8 21 12 21 16 21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 4H17V11a5 5 0 0 1-5 5 5 5 0 0 1-5-5V4z"/><path d="M5 9H3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M19 9h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/></svg>,
    child: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 3h6"/><circle cx="12" cy="8" r="3"/><path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>,
  };
  return icons[name] || null;
};

// ─── Navbar ───────────────────────────────────────────────────────────────────
const Navbar = ({ primary, accent }) => (
  <nav style={{
    position: 'sticky', top: 0, zIndex: 100,
    background: '#fff', borderBottom: '0.5px solid #c5dede',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 48px', height: 64,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div style={{ width: 32, height: 32, borderRadius: 8, background: primary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="mapPin" color="#fff" size={16} />
      </div>
      <span style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, color: primary, letterSpacing: '-0.3px' }}>
        Vereine<span style={{ color: accent }}>Finder</span>
      </span>
    </div>
    <div style={{ display: 'flex', gap: 32 }}>
      {['Vereine', 'Events', 'Karte'].map(l => (
        <a key={l} href="#" style={{ fontSize: 15, fontWeight: 500, color: '#2a4545', textDecoration: 'none', padding: '4px 0', borderBottom: l === 'Vereine' ? `2px solid ${primary}` : '2px solid transparent' }}>{l}</a>
      ))}
    </div>
    <button style={{ background: primary, color: '#fff', border: 'none', borderRadius: 8, padding: '9px 18px', fontSize: 14, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6 }}>
      <Icon name="plus" color="#fff" size={14} />
      Verein eintragen
    </button>
  </nav>
);

// ─── Breadcrumb ───────────────────────────────────────────────────────────────
const Breadcrumb = ({ primary }) => (
  <div style={{ padding: '16px 48px', borderBottom: '0.5px solid #e8f0f0', background: '#fff', display: 'flex', alignItems: 'center', gap: 6 }}>
    <a href="VereinsFinder.html" style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: primary, textDecoration: 'none', fontWeight: 500 }}>
      <Icon name="arrowLeft" color={primary} size={14} />
      Zurück zur Übersicht
    </a>
    <span style={{ color: '#c5dede', fontSize: 13 }}>·</span>
    <span style={{ fontSize: 13, color: '#7a9a9a' }}>Vereine</span>
    <span style={{ color: '#c5dede', fontSize: 13 }}>·</span>
    <span style={{ fontSize: 13, color: '#3a5555', fontWeight: 500 }}>FC Kassel Nordstadt</span>
  </div>
);

// ─── Hero header ──────────────────────────────────────────────────────────────
const HeroHeader = ({ primary, accent, saved, setSaved }) => (
  <div style={{ background: '#E4F4F5', borderBottom: '0.5px solid #c5dede', padding: '40px 48px 0' }}>
    <div style={{ maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ display: 'flex', gap: 28, alignItems: 'flex-start' }}>
        {/* Club logo placeholder */}
        <div style={{
          width: 96, height: 96, borderRadius: 16, flexShrink: 0,
          background: '#fff', border: `2px solid ${primary}30`,
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 4, boxShadow: '0 2px 12px #0D5C6318',
        }}>
          <Icon name="ball" color={primary} size={32} />
          <span style={{ fontSize: 9, color: '#7a9a9a', fontWeight: 500, textAlign: 'center', lineHeight: 1.2 }}>Vereins&shy;logo</span>
        </div>

        {/* Title block */}
        <div style={{ flex: 1 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
            <span style={{
              background: `${primary}14`, border: `1px solid ${primary}30`,
              color: primary, borderRadius: 6, padding: '3px 10px',
              fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.5px',
              display: 'flex', alignItems: 'center', gap: 4,
            }}>
              <Icon name="ball" color={primary} size={12} />
              Sport · Fußball
            </span>
            <span style={{
              background: `${primary}12`, border: `1px solid ${primary}40`,
              color: primary, borderRadius: 20, padding: '3px 10px',
              fontSize: 12, fontWeight: 700,
              display: 'flex', alignItems: 'center', gap: 4,
            }}>
              <Icon name="star" color={primary} size={11} />
              95 % Match
            </span>
          </div>

          <h1 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 38, color: '#0b1a1a', marginBottom: 10, letterSpacing: '-0.3px' }}>
            FC Kassel Nordstadt e.V.
          </h1>

          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 14, color: '#3a5555' }}>
              <Icon name="mapPin" color="#7a9a9a" size={14} />
              Nordstadt, Kassel · 3,2 km entfernt
            </span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 14, color: '#3a5555' }}>
              <Icon name="users" color="#7a9a9a" size={14} />
              312 Mitglieder
            </span>
            <span style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 14, color: '#3a5555' }}>
              <Icon name="calendar" color="#7a9a9a" size={14} />
              Gegründet 1923
            </span>
          </div>
        </div>

        {/* Action buttons */}
        <div style={{ display: 'flex', gap: 10, flexShrink: 0 }}>
          <button
            onClick={() => setSaved(!saved)}
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              padding: '10px 16px', borderRadius: 8,
              border: saved ? `1.5px solid ${primary}` : '1px solid #c5dede',
              background: saved ? `${primary}10` : '#fff',
              color: saved ? primary : '#3a5555',
              fontSize: 14, fontWeight: 500, cursor: 'pointer',
            }}
            aria-label={saved ? 'Aus Merkliste entfernen' : 'Zur Merkliste hinzufügen'}
            aria-pressed={saved}
          >
            <Icon name={saved ? 'heartFill' : 'heart'} color={saved ? primary : '#3a5555'} size={16} />
            {saved ? 'Gespeichert' : 'Speichern'}
          </button>
          <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '10px 16px', borderRadius: 8, border: '1px solid #c5dede', background: '#fff', color: '#3a5555', fontSize: 14, fontWeight: 500, cursor: 'pointer' }}>
            <Icon name="share" color="#3a5555" size={16} />
            Teilen
          </button>
          <button style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '10px 20px', borderRadius: 8, border: 'none', background: primary, color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer' }}>
            Kontakt aufnehmen
            <Icon name="arrow" color="#fff" size={15} />
          </button>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display: 'flex', gap: 0, marginTop: 32 }}>
        {['Überblick', 'Abteilungen', 'Events', 'Kontakt'].map(tab => (
          <a key={tab} href={`#${tab}`} style={{
            padding: '12px 22px',
            fontSize: 14, fontWeight: 500,
            color: tab === 'Überblick' ? primary : '#3a5555',
            borderBottom: tab === 'Überblick' ? `2px solid ${primary}` : '2px solid transparent',
            textDecoration: 'none', transition: 'color .15s',
          }}>{tab}</a>
        ))}
      </div>
    </div>
  </div>
);

// ─── Stat pill ────────────────────────────────────────────────────────────────
const StatCard = ({ icon, value, label, primary }) => (
  <div style={{
    background: '#fff', border: '0.5px solid #c5dede', borderRadius: 10,
    padding: '20px 24px', display: 'flex', alignItems: 'center', gap: 16,
  }}>
    <div style={{ width: 44, height: 44, borderRadius: 10, background: `${primary}12`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <Icon name={icon} color={primary} size={20} />
    </div>
    <div>
      <div style={{ fontSize: 22, fontWeight: 700, color: '#0b1a1a', lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 13, color: '#7a9a9a', marginTop: 2 }}>{label}</div>
    </div>
  </div>
);

// ─── Tag ─────────────────────────────────────────────────────────────────────
const Tag = ({ label }) => (
  <span style={{ fontSize: 13, fontWeight: 500, background: '#f0f9f9', color: '#2a5555', border: '0.5px solid #c5dede', borderRadius: 6, padding: '4px 10px' }}>{label}</span>
);

// ─── Section heading ──────────────────────────────────────────────────────────
const SectionH = ({ children }) => (
  <h2 style={{ fontSize: 18, fontWeight: 700, color: '#0b1a1a', marginBottom: 16 }}>{children}</h2>
);

// ─── Abteilung card ───────────────────────────────────────────────────────────
const AbteilungCard = ({ name, icon, members, ageRange, times, primary }) => (
  <div style={{ background: '#fff', border: '0.5px solid #c5dede', borderRadius: 10, padding: '20px', boxShadow: '0 1px 6px #0D5C630d' }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
      <div style={{ width: 36, height: 36, borderRadius: 8, background: `${primary}14`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name={icon} color={primary} size={18} />
      </div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 700, color: '#0b1a1a' }}>{name}</div>
        <div style={{ fontSize: 12, color: '#7a9a9a' }}>{members} Mitglieder · {ageRange}</div>
      </div>
    </div>
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      {times.map((t, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: '#3a5555' }}>
          <Icon name="clock" color="#7a9a9a" size={12} />
          {t}
        </div>
      ))}
    </div>
    <button style={{ marginTop: 14, width: '100%', padding: '9px', borderRadius: 8, border: `1.5px solid ${primary}`, background: `${primary}08`, color: primary, fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
      Anfragen
    </button>
  </div>
);

// ─── Event row ────────────────────────────────────────────────────────────────
const EventRow = ({ date, day, name, location, open, primary }) => (
  <div style={{ display: 'flex', gap: 16, alignItems: 'center', padding: '16px 0', borderBottom: '0.5px solid #e8f0f0' }}>
    <div style={{ width: 52, textAlign: 'center', flexShrink: 0 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: primary, textTransform: 'uppercase', letterSpacing: '0.5px' }}>{day}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: '#0b1a1a', lineHeight: 1.1 }}>{date}</div>
    </div>
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 15, fontWeight: 600, color: '#0b1a1a', marginBottom: 3 }}>{name}</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 13, color: '#7a9a9a' }}>
        <Icon name="mapPin" color="#7a9a9a" size={12} />
        {location}
      </div>
    </div>
    {open && (
      <span style={{ fontSize: 12, fontWeight: 600, color: '#2a7a52', background: '#e8f5ee', border: '0.5px solid #b8ddc9', borderRadius: 20, padding: '3px 10px', display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0 }}>
        <Icon name="check" color="#2a7a52" size={11} />
        Offen für alle
      </span>
    )}
  </div>
);

// ─── Contact card ─────────────────────────────────────────────────────────────
const ContactRow = ({ icon, label, value, primary }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', borderBottom: '0.5px solid #e8f0f0' }}>
    <div style={{ width: 36, height: 36, borderRadius: 8, background: `${primary}12`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
      <Icon name={icon} color={primary} size={16} />
    </div>
    <div>
      <div style={{ fontSize: 12, color: '#7a9a9a', marginBottom: 1 }}>{label}</div>
      <div style={{ fontSize: 14, fontWeight: 500, color: '#0b1a1a' }}>{value}</div>
    </div>
  </div>
);

// ─── Map placeholder ──────────────────────────────────────────────────────────
const MiniMap = ({ primary }) => (
  <div style={{
    borderRadius: 10, overflow: 'hidden', border: '0.5px solid #c5dede',
    height: 180, background: '#e8f2f0', position: 'relative',
  }}>
    <div style={{
      position: 'absolute', inset: 0,
      backgroundImage: `repeating-linear-gradient(45deg, #d4eae8 0px, #d4eae8 1px, transparent 1px, transparent 24px)`,
      opacity: 0.5,
    }} />
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} viewBox="0 0 400 180" preserveAspectRatio="none">
      <path d="M0 90 Q100 60 200 100 Q300 140 400 90" stroke="#c0d8d4" strokeWidth="8" fill="none" />
      <path d="M160 0 Q170 60 175 120 Q180 150 180 180" stroke="#c0d8d4" strokeWidth="6" fill="none" />
    </svg>
    <div style={{ position: 'absolute', top: '40%', left: '50%', transform: 'translate(-50%,-100%)' }}>
      <div style={{ background: primary, borderRadius: '50% 50% 50% 0', width: 28, height: 28, transform: 'rotate(-45deg)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 8px #0D5C6333', margin: '0 auto' }}>
        <div style={{ transform: 'rotate(45deg)' }}><Icon name="ball" color="#fff" size={13} /></div>
      </div>
      <div style={{ background: '#fff', borderRadius: 4, padding: '2px 8px', fontSize: 11, fontWeight: 600, color: '#0b1a1a', border: '0.5px solid #c5dede', marginTop: 2, whiteSpace: 'nowrap', boxShadow: '0 1px 3px #0002', textAlign: 'center' }}>
        Sportplatz Nordstadt
      </div>
    </div>
    <div style={{ position: 'absolute', bottom: 10, right: 10, background: '#fff', borderRadius: 6, padding: '5px 10px', fontSize: 11, fontWeight: 500, color: '#3a5555', border: '0.5px solid #c5dede', cursor: 'pointer' }}>
      In Karte öffnen →
    </div>
